<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Admin — Advocate Urvish</title>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { navy:"#0f1c3f", maroon:"#7a1f2b", gold:"#c9a14a", cream:"#f7f3ea" } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    body { font-family:'Poppins',sans-serif; }
    h1,h2 { font-family:'Playfair Display',serif; }
    textarea { resize:vertical; }
  </style>
</head>
<body class="bg-cream min-h-screen">

  <!-- Header -->
  <header class="bg-navy text-white py-4 px-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gold rounded-full flex items-center justify-center font-bold text-navy">U</div>
      <div>
        <div class="font-semibold text-sm">Advocate Urvish</div>
        <div class="text-gold text-xs">Blog Admin</div>
      </div>
    </div>
    <a href="index.html" class="text-xs text-gold/80 hover:text-gold underline">View Website</a>
  </header>

  <main class="max-w-lg mx-auto px-4 py-8 space-y-6">

    <!-- Not configured warning -->
    <div id="noConfig" class="hidden bg-yellow-50 border border-yellow-300 rounded-xl p-4 text-sm text-yellow-800">
      <strong>Setup needed:</strong> BLOG_ENDPOINT is not set in <code>js/config.js</code>. Deploy <code>apps-script/Blog.gs</code> and paste the URL first.
    </div>

    <!-- Write post form -->
    <div class="bg-white rounded-2xl shadow-md p-6">
      <h1 class="text-2xl text-navy mb-5">Write New Blog Post</h1>

      <div class="space-y-4">

        <div>
          <label class="block text-xs font-semibold text-navy mb-1 uppercase tracking-wide">Title *</label>
          <input id="fTitle" type="text" placeholder="e.g. How to Get a Marriage Certificate in Ahmedabad"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-navy mb-1 uppercase tracking-wide">Category *</label>
            <select id="fTag" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-gold">
              <option>Court Marriage</option>
              <option>Love Marriage</option>
              <option>Divorce</option>
              <option>Legal Rights</option>
              <option>Awareness</option>
              <option>Guidance</option>
              <option>Documentation</option>
              <option>High Court</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-navy mb-1 uppercase tracking-wide">Date</label>
            <input id="fDate" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-navy mb-1 uppercase tracking-wide">Short Summary *</label>
          <input id="fExcerpt" type="text" placeholder="1–2 lines shown on blog cards"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-navy mb-1 uppercase tracking-wide">Full Article *</label>
          <textarea id="fBody" rows="10" placeholder="Write the full article here. Leave an empty line between paragraphs."
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold"></textarea>
        </div>

        <!-- Status -->
        <div id="statusBox" class="hidden rounded-lg px-4 py-3 text-sm font-medium text-center"></div>

        <!-- Publish button -->
        <button id="publishBtn" onclick="publish()"
          class="w-full bg-navy hover:bg-navy/90 text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Publish Post
        </button>

      </div>
    </div>

    <!-- Recent posts -->
    <div class="bg-white rounded-2xl shadow-md p-6">
      <h2 class="text-lg text-navy mb-4">Published Posts</h2>
      <div id="postsList" class="text-sm text-gray-400">Loading...</div>
    </div>

  </main>

  <script>
    // Set today's date
    (function(){
      var d = new Date();
      document.getElementById("fDate").value =
        d.getFullYear() + "-" +
        String(d.getMonth()+1).padStart(2,"0") + "-" +
        String(d.getDate()).padStart(2,"0");
    })();

    var cfg = window.SITE_CONFIG || {};

    // Show warning if not configured
    if (!cfg.BLOG_ENDPOINT) {
      document.getElementById("noConfig").classList.remove("hidden");
    }

    // Load existing posts
    function loadPosts() {
      var el = document.getElementById("postsList");
      if (!cfg.BLOG_ENDPOINT) {
        el.textContent = "Configure BLOG_ENDPOINT in js/config.js to see posts.";
        return;
      }
      fetch(cfg.BLOG_ENDPOINT + "?action=posts")
        .then(function(r){ return r.json(); })
        .then(function(posts){
          if (!posts.length) { el.textContent = "No posts yet. Write your first one above!"; return; }
          el.innerHTML = posts.map(function(p){
            return '<div class="flex items-start justify-between gap-2 py-2 border-b border-gray-100 last:border-0">' +
              '<div>' +
                '<span class="inline-block bg-gold/20 text-gold text-xs font-semibold px-2 py-0.5 rounded-full mr-1">' + esc(p.tag) + '</span>' +
                '<span class="text-navy font-medium">' + esc(p.title) + '</span>' +
              '</div>' +
              '<span class="text-gray-400 text-xs whitespace-nowrap">' + esc(p.date) + '</span>' +
            '</div>';
          }).join("");
        })
        .catch(function(){ el.textContent = "Could not load posts."; });
    }
    loadPosts();

    function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function setStatus(msg, ok) {
      var box = document.getElementById("statusBox");
      box.textContent = msg;
      box.className = "rounded-lg px-4 py-3 text-sm font-medium text-center " +
        (ok ? "bg-green-50 text-green-700 border border-green-200" : "bg-red-50 text-red-700 border border-red-200");
      box.classList.remove("hidden");
    }

    function publish() {
      if (!cfg.BLOG_ENDPOINT) {
        setStatus("BLOG_ENDPOINT not set. Please complete setup first.", false);
        return;
      }

      var title   = document.getElementById("fTitle").value.trim();
      var excerpt = document.getElementById("fExcerpt").value.trim();
      var body    = document.getElementById("fBody").value.trim();
      var tag     = document.getElementById("fTag").value;
      var date    = document.getElementById("fDate").value;

      if (!title)   { setStatus("Please enter a title.", false); return; }
      if (!excerpt) { setStatus("Please enter a short summary.", false); return; }
      if (!body)    { setStatus("Please write the article.", false); return; }

      var btn = document.getElementById("publishBtn");
      btn.disabled = true;
      btn.textContent = "Publishing…";

      fetch(cfg.BLOG_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ title:title, excerpt:excerpt, body:body, tag:tag, date:date })
      })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok) {
          setStatus("Post published! It is now live on the website.", true);
          document.getElementById("fTitle").value   = "";
          document.getElementById("fExcerpt").value = "";
          document.getElementById("fBody").value    = "";
          loadPosts();
        } else {
          setStatus("Error: " + (res.error || "unknown"), false);
        }
      })
      .catch(function(){
        setStatus("Network error. Please try again.", false);
      })
      .finally(function(){
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Publish Post';
      });
    }
  </script>
</body>
</html>
